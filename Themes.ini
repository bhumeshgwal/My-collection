/* ═══════════════════════════════════════════════════
   THEMES.CSS — 5 Theme Definitions
   Apply class to <html> or <body>: theme-dressup | theme-solo | theme-manga | theme-avenger | theme-manhwa
   Default (no class) = Dress Up Darling
   ═══════════════════════════════════════════════════ */

/* ────────────────────────────────────────────
   1. DRESS UP DARLING 🧵
   Warm rose gold, soft pink, cream whites
   Font: Playfair Display + Lato
   ──────────────────────────────────────────── */
:root, [data-theme="dressup"] {
    --bg-base:      #1a0e13;
    --bg-surface:   rgba(255, 180, 200, 0.06);
    --bg-glass:     rgba(255, 200, 215, 0.08);
    --bg-glass2:    rgba(255, 180, 195, 0.12);
    --bg-modal:     rgba(30, 14, 22, 0.95);

    --accent1:      #f4a0b8;   /* soft pink */
    --accent2:      #e8c87a;   /* gold thread */
    --accent3:      #c96d8f;   /* deep rose */
    --accent-glow:  rgba(244, 160, 184, 0.35);

    --text-primary: #fce8ef;
    --text-secondary:#c4a0b0;
    --text-muted:   #7a5668;

    --border:       rgba(244, 160, 184, 0.2);
    --border-hot:   rgba(244, 160, 184, 0.55);
    --border-glow:  0 0 20px rgba(244, 160, 184, 0.2);

    --status-watch: #a8e6b8;
    --status-wish:  #f4a0b8;
    --status-done:  #8a7a8a;

    --font-display: 'Playfair Display', serif;
    --font-body:    'Lato', sans-serif;
    --font-mono:    'Space Mono', monospace;

    --gradient-hero: linear-gradient(135deg, #1a0e13 0%, #2d1220 50%, #1a0e13 100%);
    --gradient-accent: linear-gradient(135deg, var(--accent1), var(--accent3));
    --particle-color: rgba(244, 160, 184, 0.4);

    --theme-name: "Dress Up Darling";
    --theme-emoji: "🧵";
}

/* ────────────────────────────────────────────
   2. SOLO LEVELING ⚔️
   Electric blue, dungeon purple, black steel
   Font: Rajdhani + Exo 2
   ──────────────────────────────────────────── */
[data-theme="solo"] {
    --bg-base:      #050810;
    --bg-surface:   rgba(30, 100, 255, 0.05);
    --bg-glass:     rgba(40, 120, 255, 0.08);
    --bg-glass2:    rgba(50, 130, 255, 0.12);
    --bg-modal:     rgba(5, 8, 20, 0.96);

    --accent1:      #4d9fff;   /* electric blue */
    --accent2:      #9b5de5;   /* dungeon purple */
    --accent3:      #00d4ff;   /* system cyan */
    --accent-glow:  rgba(77, 159, 255, 0.4);

    --text-primary: #e0eeff;
    --text-secondary:#7aa8d8;
    --text-muted:   #3a5070;

    --border:       rgba(77, 159, 255, 0.18);
    --border-hot:   rgba(77, 159, 255, 0.6);
    --border-glow:  0 0 25px rgba(77, 159, 255, 0.25);

    --status-watch: #00d4ff;
    --status-wish:  #9b5de5;
    --status-done:  #3a5070;

    --font-display: 'Rajdhani', sans-serif;
    --font-body:    'Exo 2', sans-serif;
    --font-mono:    'Space Mono', monospace;

    --gradient-hero: linear-gradient(135deg, #050810 0%, #0a1228 50%, #050810 100%);
    --gradient-accent: linear-gradient(135deg, var(--accent1), var(--accent2));
    --particle-color: rgba(77, 159, 255, 0.5);

    --theme-name: "Solo Leveling";
    --theme-emoji: "⚔️";
}

/* ────────────────────────────────────────────
   3. MANGA 📖
   Stark black/white, ink textures, red accent
   Font: Bebas Neue + Noto Serif JP
   ──────────────────────────────────────────── */
[data-theme="manga"] {
    --bg-base:      #0d0d0d;
    --bg-surface:   rgba(255, 255, 255, 0.04);
    --bg-glass:     rgba(255, 255, 255, 0.06);
    --bg-glass2:    rgba(255, 255, 255, 0.09);
    --bg-modal:     rgba(10, 10, 10, 0.97);

    --accent1:      #e8e8e8;   /* ink white */
    --accent2:      #cc1111;   /* manga red */
    --accent3:      #ff4444;   /* shonen burst */
    --accent-glow:  rgba(204, 17, 17, 0.35);

    --text-primary: #f0f0f0;
    --text-secondary:#aaaaaa;
    --text-muted:   #555555;

    --border:       rgba(255, 255, 255, 0.12);
    --border-hot:   rgba(204, 17, 17, 0.6);
    --border-glow:  0 0 20px rgba(204, 17, 17, 0.2);

    --status-watch: #88dd88;
    --status-wish:  #e8e8e8;
    --status-done:  #555555;

    --font-display: 'Bebas Neue', cursive;
    --font-body:    'Crimson Pro', serif;
    --font-mono:    'Space Mono', monospace;

    --gradient-hero: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%);
    --gradient-accent: linear-gradient(135deg, var(--accent1), var(--accent2));
    --particle-color: rgba(204, 17, 17, 0.5);

    --theme-name: "Manga";
    --theme-emoji: "📖";
}

/* ────────────────────────────────────────────
   4. AVENGER 🦸
   Iron red, arc reactor blue, titanium grey
   Font: Oswald + Barlow Condensed
   ──────────────────────────────────────────── */
[data-theme="avenger"] {
    --bg-base:      #080c10;
    --bg-surface:   rgba(180, 30, 30, 0.05);
    --bg-glass:     rgba(180, 30, 30, 0.07);
    --bg-glass2:    rgba(200, 50, 50, 0.1);
    --bg-modal:     rgba(8, 12, 16, 0.97);

    --accent1:      #c0392b;   /* iron red */
    --accent2:      #c8a020;   /* gold armor */
    --accent3:      #5dade2;   /* arc reactor */
    --accent-glow:  rgba(192, 57, 43, 0.4);

    --text-primary: #e8e0d8;
    --text-secondary:#9a8878;
    --text-muted:   #4a4040;

    --border:       rgba(192, 57, 43, 0.2);
    --border-hot:   rgba(192, 57, 43, 0.65);
    --border-glow:  0 0 22px rgba(192, 57, 43, 0.28);

    --status-watch: #5dade2;
    --status-wish:  #c8a020;
    --status-done:  #4a4040;

    --font-display: 'Oswald', sans-serif;
    --font-body:    'Barlow Condensed', sans-serif;
    --font-mono:    'Space Mono', monospace;

    --gradient-hero: linear-gradient(135deg, #080c10 0%, #14181e 50%, #080c10 100%);
    --gradient-accent: linear-gradient(135deg, var(--accent1), var(--accent2));
    --particle-color: rgba(192, 57, 43, 0.5);

    --theme-name: "Avenger";
    --theme-emoji: "🦸";
}

/* ────────────────────────────────────────────
   5. MANHWA 🌙
   Deep teal, moonlit silver, ocean dark
   Font: Cinzel + Crimson Pro
   ──────────────────────────────────────────── */
[data-theme="manhwa"] {
    --bg-base:      #060e12;
    --bg-surface:   rgba(0, 180, 180, 0.05);
    --bg-glass:     rgba(0, 200, 200, 0.07);
    --bg-glass2:    rgba(0, 220, 210, 0.1);
    --bg-modal:     rgba(6, 14, 18, 0.97);

    --accent1:      #00c9b8;   /* teal jade */
    --accent2:      #7ecfdf;   /* moonlight blue */
    --accent3:      #e0b060;   /* ancient gold */
    --accent-glow:  rgba(0, 201, 184, 0.35);

    --text-primary: #d8eeee;
    --text-secondary:#7aacb0;
    --text-muted:   #2a5055;

    --border:       rgba(0, 201, 184, 0.18);
    --border-hot:   rgba(0, 201, 184, 0.55);
    --border-glow:  0 0 22px rgba(0, 201, 184, 0.22);

    --status-watch: #00c9b8;
    --status-wish:  #e0b060;
    --status-done:  #2a5055;

    --font-display: 'Cinzel', serif;
    --font-body:    'Crimson Pro', serif;
    --font-mono:    'Space Mono', monospace;

    --gradient-hero: linear-gradient(135deg, #060e12 0%, #0a1820 50%, #060e12 100%);
    --gradient-accent: linear-gradient(135deg, var(--accent1), var(--accent3));
    --particle-color: rgba(0, 201, 184, 0.45);

    --theme-name: "Manhwa";
    --theme-emoji: "🌙";
}